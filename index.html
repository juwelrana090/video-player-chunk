<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VLC Local Player</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            vlc: {
              bg: '#0d0d0f', bg2: '#141417', srf: '#1a1a1e', srf2: '#252529',
              srf3: '#333338', orange: '#ff6a00', orange2: '#ff8a1e', danger: '#ff4538'
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    ::-webkit-scrollbar {
      width: 4px
    }

    ::-webkit-scrollbar-thumb {
      background: #333338;
      border-radius: 2px
    }

    /* seek bar hover effects */
    .seek-wrap:hover .seek-bar {
      height: 6px
    }

    .seek-wrap:hover .seek-dot {
      opacity: 1
    }

    /* file row: show action button on hover */
    .file-row:hover .row-act {
      opacity: 1
    }

    /* grid view thumbnail hover */
    .file-grid-item:hover .row-act {
      opacity: 1;
    }

    /* range input */
    input[type=range] {
      -webkit-appearance: none;
      height: 4px;
      background: rgba(255, 255, 255, .2);
      border-radius: 2px;
      outline: none;
      cursor: pointer
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 11px;
      height: 11px;
      background: #fff;
      border-radius: 50%
    }

    input[type=range]::-moz-range-thumb {
      width: 11px;
      height: 11px;
      background: #fff;
      border-radius: 50%;
      border: none
    }

    /* FIX 7: dark background for select option elements */
    select option {
      background: #252529;
      color: #f0f0f5
    }

    /* animations */
    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes flashOut {
      0% {
        opacity: 1
      }

      100% {
        opacity: 0
      }
    }

    .spin {
      animation: spin .75s linear infinite
    }

    .flash-go {
      animation: flashOut .4s ease-out forwards
    }

    /* toggled via JS — DO NOT use Tailwind 'hidden' class for these */
    .tinfo.vis {
      display: block
    }

    .osd.on {
      opacity: 1 !important
    }

    .btn.on {
      color: #ff6a00 !important
    }
  </style>
</head>

<body class="bg-vlc-bg text-white h-screen overflow-hidden flex flex-col select-none text-[13px]">

  <!-- TOPBAR -->
  <div class="h-11 bg-vlc-srf border-b border-white/5 flex items-center px-4 gap-3 flex-shrink-0">
    <div
      class="flex items-center gap-1.5 bg-gradient-to-r from-vlc-orange to-vlc-orange2 px-3 py-1 rounded-full text-xs font-bold text-white flex-shrink-0">
      &#9654; VLC</div>
    <span class="font-semibold text-sm flex-shrink-0">Local Player</span>
    <div id="topNow" class="flex-1 text-xs text-white/30 overflow-hidden text-ellipsis whitespace-nowrap px-2">No file
      loaded</div>
    <!-- FIX 1: use style="display:none" NOT class="hidden" for JS-toggled elements -->
    <span id="extPill" style="display:none"
      class="text-[10px] font-bold tracking-widest uppercase px-2 py-0.5 rounded bg-vlc-srf2 border border-white/10 text-white/50"></span>
    <span id="folderBadge" style="display:none"
      class="text-[10px] text-vlc-orange/70 bg-vlc-orange/10 border border-vlc-orange/20 px-2 py-0.5 rounded font-medium max-w-[140px] truncate"></span>
  </div>

  <!-- LAYOUT -->
  <div class="flex flex-1 min-h-0">

    <!-- SIDEBAR -->
    <aside class="w-72 flex-shrink-0 bg-vlc-srf border-r border-white/5 flex flex-col overflow-hidden">

      <!-- FOLDER INPUT -->
      <div class="p-3 flex-shrink-0 border-b border-white/5 space-y-2">
        <div class="text-[10px] font-bold tracking-widest uppercase text-white/30">&#128193; Video Folder</div>
        <div class="flex gap-2">
          <input id="pathInput" type="text" placeholder="Scanning your Videos folder..." class="flex-1 bg-vlc-srf2 border border-white/10 rounded-lg px-3 py-2 text-xs text-white
                 placeholder-white/20 outline-none focus:border-vlc-orange/50 transition-colors min-w-0">
          <button onclick="scanFolder()"
            class="px-3 py-2 bg-vlc-orange hover:bg-vlc-orange2 rounded-lg text-xs font-bold text-white transition-colors flex-shrink-0">Scan</button>
        </div>
        <!-- FIX 8: quickPath now calls /homedir to get actual user home -->
        <div class="flex gap-1.5">
          <button onclick="quickPath('desktop')"
            class="px-2 py-1 text-[10px] rounded bg-vlc-srf3 text-white/40 hover:text-white hover:bg-white/10 transition-colors">Desktop</button>
          <button onclick="quickPath('downloads')"
            class="px-2 py-1 text-[10px] rounded bg-vlc-srf3 text-white/40 hover:text-white hover:bg-white/10 transition-colors">Downloads</button>
          <button onclick="quickPath('videos')"
            class="px-2 py-1 text-[10px] rounded bg-vlc-srf3 text-white/40 hover:text-white hover:bg-white/10 transition-colors">Videos</button>
        </div>
        <div id="scanStatus" class="text-[11px] text-white/30 min-h-[16px]"></div>
      </div>

      <!-- RECENT FOLDERS: FIX 1 — style="display:none" not hidden class -->
      <div id="recentList" style="display:none" class="border-b border-white/5 flex-shrink-0 max-h-32 overflow-y-auto">
        <div class="px-3 pt-1.5 pb-0.5 text-[9px] font-bold uppercase tracking-widest text-white/20">Recent</div>
        <!-- items rendered by renderRecent() -->
      </div>

      <!-- FILE LIST HEADER -->
      <div class="flex items-center justify-between px-3 py-2 bg-vlc-bg2 border-b border-white/5 flex-shrink-0">
        <div class="flex items-center gap-2">
          <span class="text-[10px] font-bold uppercase tracking-widest text-white/30"
            >Library</span
          >
          <span
            id="fileCount"
            class="text-[11px] text-white/30 bg-vlc-srf2 px-2 py-0.5 rounded-full"
            >0</span
          >
        </div>
        <!-- View toggle: list / grid -->
        <div class="flex items-center gap-0.5">
          <button
            id="btnViewList"
            onclick="setView('list')"
            title="List view"
            class="px-1.5 py-1 rounded text-sm transition-colors text-vlc-orange bg-vlc-orange/10"
          >
            ☰
          </button>
          <button
            id="btnViewGrid"
            onclick="setView('grid')"
            title="Grid view"
            class="px-1.5 py-1 rounded text-sm transition-colors text-white/30 hover:text-white hover:bg-white/10"
          >
            ⊞
          </button>
        </div>
      </div>

      <!-- FILE LIST: FIX 2 — uses event delegation, data-path / data-name attrs -->
      <div id="fileList" class="flex-1 overflow-y-auto p-1">
        <div class="text-center py-10 text-white/20 text-xs leading-loose">Enter a folder path above<br>and click Scan.
        </div>
      </div>
    </aside>

    <!-- VIDEO AREA -->
    <div id="vmain" class="flex-1 flex flex-col bg-black min-w-0">
      <div id="vwrap" class="flex-1 relative flex items-center justify-center bg-black overflow-hidden">
        <video id="vid" preload="none" class="max-w-full max-h-full w-full h-full object-contain block"></video>

        <!-- Placeholder -->
        <div id="vph" class="absolute inset-0 flex flex-col items-center justify-center gap-3 pointer-events-none">
          <div class="text-6xl opacity-10">&#127916;</div>
          <div class="text-white/20 text-sm text-center leading-relaxed">Scan a folder and click a video to play</div>
        </div>

        <!-- Loading: FIX 1 — style="display:none" not Tailwind hidden -->
        <div id="vload" style="display:none"
          class="absolute inset-0 bg-black/75 flex-col items-center justify-center gap-3 z-[5]">
          <div class="w-9 h-9 rounded-full border-[3px] border-vlc-orange/20 border-t-vlc-orange spin"></div>
          <div id="vloadTxt" class="text-white/60 text-sm">Loading…</div>
        </div>

        <!-- Click-to-play: FIX 1 — style="display:none" not Tailwind hidden -->
        <div id="clickToPlay" style="display:none"
          class="absolute inset-0 bg-black/75 flex-col items-center justify-center gap-4 z-[10] cursor-pointer">
          <div
            class="w-20 h-20 bg-vlc-orange hover:bg-vlc-orange2 rounded-full flex items-center justify-center text-3xl shadow-[0_0_40px_rgba(255,106,0,.5)] transition-colors">
            &#9654;</div>
          <div class="text-white/60 text-sm">Click to play with audio</div>
        </div>

        <!-- Flash -->
        <div id="vflash" class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-0 z-[6]">
          <div id="flashDisc" class="w-16 h-16 bg-black/60 rounded-full flex items-center justify-center text-2xl">
            &#9654;</div>
        </div>

        <!-- OSD -->
        <div id="osd"
          class="absolute top-4 right-4 bg-black/75 text-white px-3 py-1.5 rounded-lg text-sm pointer-events-none opacity-0 transition-opacity z-[8] max-w-[220px] backdrop-blur-sm border border-white/10">
        </div>

        <!-- Media Info Panel: FIX 1 — tinfo uses .vis CSS class, not Tailwind hidden -->
        <div id="tinfo"
          class="absolute right-4 bottom-24 w-56 bg-vlc-bg/95 backdrop-blur-xl border border-white/10 rounded-xl p-3.5 z-[9]"
          style="display:none">
          <div class="text-[9px] font-bold uppercase tracking-[1px] text-white/30 mb-2.5">&#128202; Media Info</div>
          <div id="tinfoRows"></div>
        </div>
      </div>

      <!-- CONTROLS -->
      <div class="flex-shrink-0 bg-gradient-to-t from-black/95 to-black/70 px-4 pt-2 pb-3 border-t border-white/[0.04]">
        <!-- Seek bar -->
        <div class="seek-wrap relative flex items-center h-5 cursor-pointer mb-2">
          <div class="seek-bar relative w-full h-1 bg-white/10 rounded-full transition-all duration-100" id="sbar">
            <div id="sbuf" class="absolute inset-y-0 left-0 bg-white/20 rounded-full pointer-events-none"
              style="width:0"></div>
            <div id="splayed" class="absolute inset-y-0 left-0 bg-vlc-orange rounded-full pointer-events-none"
              style="width:0"></div>
            <div id="sdot"
              class="seek-dot absolute top-1/2 -translate-y-1/2 -translate-x-1/2 w-3 h-3 bg-white rounded-full opacity-0 transition-opacity shadow-lg pointer-events-none"
              style="left:0"></div>
          </div>
          <div id="stip"
            class="absolute -top-7 -translate-x-1/2 bg-black/85 text-white text-[11px] px-2 py-0.5 rounded pointer-events-none whitespace-nowrap"
            style="opacity:0;left:0">0:00</div>
        </div>

        <!-- Button row -->
        <div class="flex items-center gap-0.5">
          <button id="btnPlay"
            class="btn p-1.5 rounded-lg text-xl hover:bg-white/10 active:scale-90 transition-all">&#9654;</button>
          <button id="btnStop"
            class="btn p-1.5 rounded-lg text-[17px] hover:bg-white/10 active:scale-90 transition-all">&#9209;</button>
          <button id="btnRew" class="btn p-1.5 rounded-lg text-[17px] hover:bg-white/10 active:scale-90 transition-all"
            title="-10s (←)">&#9194;</button>
          <button id="btnFwd" class="btn p-1.5 rounded-lg text-[17px] hover:bg-white/10 active:scale-90 transition-all"
            title="+10s (→)">&#9193;</button>

          <div class="w-px h-4 bg-white/10 mx-1 flex-shrink-0"></div>

          <button id="btnMute"
            class="btn p-1.5 rounded-lg text-[17px] hover:bg-white/10 active:scale-90 transition-all">&#128266;</button>
          <input id="volRange" type="range" class="w-16 mx-1" min="0" max="1" step="0.05" value="1">

          <div class="text-xs text-white/40 tabular-nums mx-2 whitespace-nowrap flex-shrink-0">
            <span class="text-white" id="timeCur">0:00</span><span class="mx-0.5">/</span><span id="timeTot">0:00</span>
          </div>

          <div class="ml-auto flex items-center gap-1">
            <!-- FIX 1: audWrap uses style="display:none" not Tailwind hidden -->
            <div id="audWrap" style="display:none"
              class="items-center gap-1.5 bg-vlc-srf2 border border-white/10 rounded-lg px-2.5 py-1.5">
              <span class="text-xs">&#127925;</span>
              <span class="text-[11px] text-white/40">Audio:</span>
              <select id="audSel"
                class="bg-transparent border-none text-white text-xs outline-none cursor-pointer max-w-[250px]"></select>
            </div>
            <div class="w-px h-4 bg-white/10 mx-0.5 flex-shrink-0"></div>
            <select id="spdSel"
              class="bg-vlc-srf2 border border-white/10 text-white text-xs px-2 py-1.5 rounded-lg cursor-pointer outline-none appearance-none">
              <option value="0.25">0.25×</option>
              <option value="0.5">0.5×</option>
              <option value="0.75">0.75×</option>
              <option value="1" selected>1×</option>
              <option value="1.25">1.25×</option>
              <option value="1.5">1.5×</option>
              <option value="2">2×</option>
              <option value="3">3×</option>
            </select>
            <button id="btnLoop"
              class="btn p-1.5 rounded-lg text-[17px] hover:bg-white/10 transition-all">&#128257;</button>
            <button id="btnAutoplay"
              title="Auto-next (N)"
              class="btn on p-1.5 rounded-lg text-[17px] hover:bg-white/10 transition-all">&#9197;</button>
            <button id="btnInfo"
              class="btn p-1.5 rounded-lg text-[17px] hover:bg-white/10 transition-all">&#8505;</button>
            <button id="btnPip" title="Picture-in-Picture (P)"
              class="btn p-1.5 rounded-lg hover:bg-white/10 transition-all flex items-center justify-center">
              <svg width="17" height="17" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="1.5" y="3.5" width="17" height="12" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
                <rect x="10.5" y="10.5" width="8" height="5" rx="1" fill="currentColor"/>
              </svg>
            </button>
            <button id="btnFs"
              class="btn p-1.5 rounded-lg text-[17px] hover:bg-white/10 transition-all">&#9974;</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    'use strict';

    /* ── STATE ────────────────────────────────────────────────────────────────── */
    const S = {
      filePath: null, fileName: null, isDirect: false,
      info: null, duration: 0, audioIdx: 0, offset: 0,
      looping: false, showInfo: false, osdTimer: null,
      recentDirs: [], homePath: '',
      view:        'list',     // 'list' | 'grid'
      _lastDirs:   [],         // subdirs from last scan
      _lastFiles:  null,       // files from last scan
      autoplay:    true,        // auto-advance to next file when video ends
      currentDir:  '',          // currently browsed directory path
      isPip:       false,       // picture-in-picture active
    };
    const $ = id => document.getElementById(id);
    const vid = $('vid');

    /* ── UTILS ────────────────────────────────────────────────────────────────── */
    function fmt(s) {
      if (!isFinite(s) || s < 0) return '0:00';
      const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
      return h > 0 ? `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}` : `${m}:${String(sec).padStart(2, '0')}`;
    }
    function fmtSz(b) {
      if (b < 1e3) return b + ' B'; if (b < 1e6) return (b / 1e3).toFixed(1) + ' KB';
      if (b < 1e9) return (b / 1e6).toFixed(1) + ' MB'; return (b / 1e9).toFixed(2) + ' GB';
    }
    // FIX 2: escH is for HTML output only — NOT for JS strings in onclick
    function escH(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
    // escJs is for JavaScript strings in onclick attributes
    function escJs(s) { return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '\\r'); }

    function showOSD(msg, ms = 2300) {
      $('osd').textContent = msg; $('osd').classList.add('on');
      clearTimeout(S.osdTimer); S.osdTimer = setTimeout(() => $('osd').classList.remove('on'), ms);
    }
    // FIX 1: display:'flex' works because we no longer use Tailwind 'hidden' class
    function showLoad(msg) { $('vloadTxt').textContent = msg; $('vload').style.display = 'flex'; }
    function hideLoad() { $('vload').style.display = 'none'; }
    function showCTP() { $('clickToPlay').style.display = 'flex'; }
    function hideCTP() { $('clickToPlay').style.display = 'none'; }
    function flash(p) {
      $('flashDisc').textContent = p ? '▶' : '⏸';
      $('vflash').classList.remove('flash-go'); void $('vflash').offsetWidth; $('vflash').classList.add('flash-go');
    }
    function syncMute() { $('btnMute').textContent = vid.muted || vid.volume === 0 ? '🔇' : vid.volume < .5 ? '🔈' : '🔊'; }
    // CRITICAL: transcode = S.offset + vid.currentTime; direct = vid.currentTime
    function actualTime() { return S.isDirect ? vid.currentTime : S.offset + vid.currentTime; }

    /* ── FIX 5: canDirect checks BOTH video AND audio codec ─────────────────── */
    function canDirect(fileName, info, audioIdx) {
      if (audioIdx !== 0) return false; // audio switching needs ffmpeg
      const ext = (fileName.split('.').pop() || '').toLowerCase();
      if (ext !== 'mp4' && ext !== 'm4v' && ext !== 'webm') return false;
      const vcodec = info?.video?.[0]?.codec;
      const goodVideo = vcodec === 'h264' || vcodec === 'hevc' || vcodec === 'vp8' || vcodec === 'vp9';
      if (!goodVideo) return false;
      // FIX 5: also check audio — DTS, AC3, TrueHD cannot play directly in browsers
      if (!info?.audio?.length) return true; // no audio = fine
      const acodec = info.audio[0]?.codec || '';
      const browserAudio = ['aac', 'mp3', 'mp4a', 'opus', 'vorbis', 'flac', 'pcm_s16le', 'pcm_s24le'];
      return browserAudio.some(c => acodec.toLowerCase().includes(c));
    }

    /* ── FIX 8: quickPath uses /homedir for real user paths ─────────────────── */
    async function loadHomePath() {
      try { const r = await fetch('/homedir'); const d = await r.json(); S.homePath = d.home || ''; } catch { }
    }
    function quickPath(type) {
      const home = S.homePath;
      const sep = home.includes('\\') ? '\\' : '/';
      const paths = {
        desktop: home ? home + sep + 'Desktop' : '',
        downloads: home ? home + sep + 'Downloads' : '',
        videos: home ? home + sep + (home.includes('\\') ? 'Videos' : 'Movies') : '',
      };
      const p = paths[type] || '';
      if (!p) { showOSD('⚠️ Home path not loaded yet — try scanning manually'); return; }
      $('pathInput').value = p;
      scanFolder(p);  // ← auto-scan immediately on shortcut click
    }

    /* ── FOLDER SCANNING ─────────────────────────────────────────────────────── */
    async function scanFolder(dir) {
      dir = dir || $('pathInput').value.trim();
      if (!dir) { showOSD('⚠️ Enter a folder path'); return; }
      const st = $('scanStatus');
      st.textContent = 'Scanning…'; st.style.color = 'rgba(255,255,255,.3)';
      try {
        const r = await fetch('/scan', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ dir }) });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Scan failed');
        S.recentDirs = [...new Set([d.dir, ...S.recentDirs])].slice(0, 5);
        localStorage.setItem('vlc_recent', JSON.stringify(S.recentDirs));
        $('pathInput').value = d.dir;
        S.currentDir = d.dir;
        st.textContent = `${d.files.length} video${d.files.length !== 1 ? 's' : ''} found`;
        st.style.color = d.files.length > 0 ? '#4ade80' : 'rgba(255,255,255,.3)';
        const parts = d.dir.replace(/\\/g, '/').split('/').filter(Boolean);
        $('folderBadge').textContent = parts[parts.length - 1] || d.dir; $('folderBadge').style.display = '';
        renderRecent();
        S._lastDirs = d.dirs || [];
        S._lastFiles = d.files || [];
        renderBrowser(S._lastDirs, S._lastFiles);
      } catch (err) { st.textContent = '❌ ' + err.message; st.style.color = '#f87171'; }
    }

    function renderRecent() {
      const el = $('recentList'); if (!S.recentDirs.length) { el.style.display = 'none'; return; }
      el.style.display = 'block';
      // FIX 3: use data-dir attribute, not inline onclick with escaped strings
      const hd = '<div class="px-3 pt-1.5 pb-0.5 text-[9px] font-bold uppercase tracking-widest text-white/20">Recent</div>';
      el.innerHTML = hd + S.recentDirs.map(d => {
        const label = d.replace(/\\/g, '/').split('/').filter(Boolean).pop() || d;
        return `<div class="recent-dir block w-full text-left px-3 py-1.5 text-[11px] text-white/30 hover:text-white hover:bg-vlc-srf2 truncate transition-colors cursor-pointer" data-dir="${escH(d)}" title="${escH(d)}">📁 ${escH(label)}</div>`;
      }).join('');
    }

    // FIX 2+3: event delegation for file list AND recent list
    document.addEventListener('click', e => {
      // Recent folder click
      const rd = e.target.closest('.recent-dir');
      if (rd) { const d = rd.dataset.dir; if (d) { $('pathInput').value = d; scanFolder(d); } return; }
      // Subfolder row click — navigate into dir
      const dr = e.target.closest('[data-dir-path]');
      if (dr) { const dp = dr.dataset.dirPath; if (dp) { $('pathInput').value = dp; scanFolder(dp); } return; }
      // File row click — but not delete button
      const del = e.target.closest('[data-del]');
      if (del) { e.stopPropagation(); return; }
      const row = e.target.closest('[data-path]');
      if (row && row.dataset.path && row.dataset.name) playFile(row.dataset.path, row.dataset.name);
    });

    /* ── renderBrowser: unified dirs + files in #fileList ────────────────────── */
    // Replaces the old separate renderDirs() + renderFiles().
    // Renders: [← Parent] → [📁 Folders] → [── N videos ──] → [🎬 Files]
    function renderBrowser(dirs, files) {
      const el = $('fileList');
      $('fileCount').textContent = files.length;

      const parent = parentDir(S.currentDir);
      let html = '';

      // ── Parent row ────────────────────────────────────────────────────────────
      if (parent) {
        html += `
        <div class="flex items-center gap-2 px-2 py-1.5 rounded-lg cursor-pointer
                    hover:bg-vlc-srf2 transition-colors group border-b border-white/5 mb-1"
             data-dir-path="${escH(parent)}">
          <div class="w-[52px] h-[33px] bg-vlc-srf2 rounded flex-shrink-0
                      flex items-center justify-center text-base text-white/40">
            ↑
          </div>
          <div class="flex-1 min-w-0">
            <div class="text-xs font-medium text-white/50 group-hover:text-white transition-colors">
              .. Parent folder
            </div>
            <div class="text-[10px] text-white/25 truncate">${escH(parent)}</div>
          </div>
        </div>`;
      }

      // ── Folder rows ───────────────────────────────────────────────────────────
      dirs.forEach((d) => {
        html += `
        <div class="flex items-center gap-2 px-2 py-1.5 rounded-lg cursor-pointer
                    hover:bg-vlc-srf2 transition-colors group"
             data-dir-path="${escH(d.path)}">
          <div class="w-[52px] h-[33px] bg-vlc-srf2 rounded flex-shrink-0
                      flex items-center justify-center text-lg text-white/30">
            📁
          </div>
          <div class="flex-1 min-w-0">
            <div class="text-xs font-medium text-white/70 truncate
                        group-hover:text-white transition-colors"
                 title="${escH(d.name)}">${escH(d.name)}</div>
            <div class="text-[10px] text-white/25">Folder</div>
          </div>
          <span class="text-white/20 text-xs group-hover:text-white/50 flex-shrink-0">›</span>
        </div>`;
      });

      // ── Separator between folders and files ───────────────────────────────────
      if (dirs.length > 0 && files.length > 0) {
        html += `
        <div class="flex items-center gap-2 px-2 py-1 mt-1 mb-0.5">
          <div class="flex-1 h-px bg-white/5"></div>
          <span class="text-[9px] font-bold uppercase tracking-widest text-white/20">
            ${files.length} video${files.length !== 1 ? 's' : ''}
          </span>
          <div class="flex-1 h-px bg-white/5"></div>
        </div>`;
      }

      // ── File rows: list or grid ───────────────────────────────────────────────
      if (!files.length && !dirs.length && !parent) {
        el.innerHTML =
          '<div class="text-center py-10 text-white/20 text-xs leading-loose">No videos or folders found.<br>Try a different path.</div>';
        return;
      }

      if (S.view === 'grid' && files.length > 0) {
        html +=
          `<div class="grid grid-cols-2 gap-1.5 p-1.5 mt-1">` +
          files
            .map((f) => {
              const ext = (f.name.split('.').pop() || '').toUpperCase();
              const act = S.filePath === f.path;
              return `
            <div class="file-grid-item relative rounded-lg overflow-hidden cursor-pointer
                        border-2 transition-all ${act ? 'border-vlc-orange' : 'border-transparent hover:border-white/10'}"
               data-path="${escH(f.path)}" data-name="${escH(f.name)}">
              <div class="w-full aspect-video bg-vlc-srf3 overflow-hidden">
                <img src="/thumb?path=${encodeURIComponent(f.path)}" alt=""
                     class="w-full h-full object-cover"
                     onerror="this.parentNode.innerHTML='<div class=\'w-full h-full flex items-center justify-center text-2xl\'>🎬</div>'">
              </div>
              <div class="px-1.5 py-1 bg-vlc-srf2">
                <div class="text-[10px] font-medium truncate ${act ? 'text-vlc-orange2' : 'text-white/80'}"
                     title="${escH(f.name)}">${escH(f.name)}</div>
                <div class="flex items-center gap-1 mt-0.5">
                  <span class="text-[8px] font-bold uppercase px-1 py-px rounded bg-vlc-srf3 text-white/25">${escH(ext)}</span>
                  <span class="text-[10px] text-white/25">${fmtSz(f.size)}</span>
                </div>
              </div>
              <div class="row-act opacity-0 transition-opacity absolute inset-0 flex items-center justify-center
                          bg-black/40 pointer-events-none">
                <span class="text-white text-2xl">▶</span>
              </div>
            </div>`;
            })
            .join('') +
          `</div>`;
      } else {
        html += files
          .map((f) => {
            const ext = (f.name.split('.').pop() || '').toUpperCase();
            const act = S.filePath === f.path;
            return `
          <div class="file-row flex items-center gap-2 px-2 py-1.5 cursor-pointer border-l-2 transition-colors
                      ${act ? 'bg-vlc-orange/10 border-vlc-orange' : 'hover:bg-vlc-srf2 border-transparent'}"
             data-path="${escH(f.path)}" data-name="${escH(f.name)}">
            <div class="w-[52px] h-[33px] bg-vlc-srf3 rounded flex-shrink-0 overflow-hidden flex items-center justify-center text-base">
              <img src="/thumb?path=${encodeURIComponent(f.path)}" alt=""
                   class="w-full h-full object-cover"
                   onerror="this.parentNode.innerHTML='🎬'">
            </div>
            <div class="flex-1 min-w-0">
              <div class="text-xs font-medium truncate ${act ? 'text-vlc-orange2' : 'text-white'}"
                   title="${escH(f.name)}">${escH(f.name)}</div>
              <div class="flex items-center gap-1.5 mt-0.5">
                <span class="text-[9px] font-bold uppercase px-1 py-px rounded bg-vlc-srf3 text-white/25">${escH(ext)}</span>
                <span class="text-[11px] text-white/25">${fmtSz(f.size)}</span>
              </div>
            </div>
            <div class="row-act opacity-0 transition-opacity flex-shrink-0">
              <span class="text-[10px] px-2 py-1 rounded bg-vlc-orange/20 text-vlc-orange font-bold">▶</span>
            </div>
          </div>`;
          })
          .join('');
      }

      el.innerHTML = html;
    }

    /* ── parentDir: compute parent path cross-platform ───────────────────────── */
    function parentDir(p) {
      const isWin = p.includes('\\') || /^[A-Za-z]:/.test(p);
      const sep = isWin ? '\\' : '/';
      const parts = p
        .replace(/[\\/]+$/, '')
        .split(/[\\/]/)
        .filter(Boolean);
      if (parts.length <= 1) return null; // already at root
      parts.pop();
      const joined = parts.join(sep);
      return isWin ? joined : '/' + joined;
    }

    /* ── setView: toggle between list and grid view ──────────────────────────── */
    function setView(mode) {
      S.view = mode;
      const btnList = $('btnViewList');
      const btnGrid = $('btnViewGrid');

      // active state: orange highlight
      btnList.className = `px-1.5 py-1 rounded text-sm transition-colors ${
        mode === 'list'
          ? 'text-vlc-orange bg-vlc-orange/10'
          : 'text-white/30 hover:text-white hover:bg-white/10'
      }`;
      btnGrid.className = `px-1.5 py-1 rounded text-sm transition-colors ${
        mode === 'grid'
          ? 'text-vlc-orange bg-vlc-orange/10'
          : 'text-white/30 hover:text-white hover:bg-white/10'
      }`;

      // re-render current file list in new view
      if (S._lastDirs !== undefined && S._lastFiles) renderBrowser(S._lastDirs, S._lastFiles);
    }

    /* ── PLAYER ──────────────────────────────────────────────────────────────── */
    async function playFile(filePath, fileName) {
      S.filePath = filePath; S.fileName = fileName; S.audioIdx = 0; S.offset = 0; S.isDirect = false;
      if (S._lastFiles) renderBrowser(S._lastDirs || [], S._lastFiles);
      $('vph').style.display = 'none';
      $('extPill').textContent = (fileName.split('.').pop() || '').toUpperCase(); $('extPill').style.display = '';
      $('topNow').innerHTML = `Now playing: <em class="text-white/50">${escH(fileName)}</em>`;
      showLoad('Reading file info…');
      try {
        const r = await fetch(`/info?path=${encodeURIComponent(filePath)}`);
        if (!r.ok) throw new Error('Info error ' + r.status);
        S.info = await r.json(); S.duration = S.info.format.duration || 0;
        $('timeTot').textContent = fmt(S.duration); buildAudSel(S.info.audio);
        showLoad('Buffering…'); loadStream(0, 0);
      } catch (err) { hideLoad(); $('vph').style.display = 'flex'; showOSD('❌ ' + err.message); }
    }

    function buildAudSel(tracks) {
      // FIX 1: display:'flex' works now — no hidden class conflict
      if (!tracks || !tracks.length) { $('audWrap').style.display = 'none'; return; }
      $('audWrap').style.display = 'flex';
      $('audSel').innerHTML = tracks.map((t, i) => {
        console.log('[audSel]', i, t);
        const ch = t.channels ? `/${t.channels}ch` : '', c = t.codec ? ` (${t.codec}${ch})` : '';
        return `<option value="${i}">[${t.language || ''}] ${escH(t.label)}${c}</option>`;
      }).join('');
      $('audSel').value = '0';
    }

    function loadStream(startTime, audioIdx) {
      S.offset = startTime; if (audioIdx !== undefined) S.audioIdx = audioIdx;
      const aidx = (S.info?.audio?.length > 0) ? S.audioIdx : -1;
      // FIX 5: canDirect now checks audio codec too
      S.isDirect = canDirect(S.fileName, S.info, S.audioIdx);
      const vol = vid.volume || parseFloat($('volRange').value) || 1, muted = vid.muted;
      if (S.isDirect) {
        vid.src = `/stream?path=${encodeURIComponent(S.filePath)}&direct=1`;
        vid.volume = vol; vid.muted = muted;
        if (startTime > 0) vid.addEventListener('loadedmetadata', function f() { vid.currentTime = startTime; vid.removeEventListener('loadedmetadata', f); });
      } else {
        vid.src = `/stream?path=${encodeURIComponent(S.filePath)}&audio=${aidx}&start=${startTime.toFixed(3)}`;
        vid.volume = vol; vid.muted = muted;
      }
      const p = vid.play();
      if (p) p.catch(err => {
        if (err.name === 'NotAllowedError' || err.name === 'NotSupportedError') { hideLoad(); showCTP(); }
        else console.warn('[play]', err.name, err.message);
      });
    }

    function stopAll() {
      // Exit PiP before clearing src — browser throws if src cleared while in PiP
      if (document.pictureInPictureElement === vid) {
        document.exitPictureInPicture().catch(() => {});
      }
      vid.pause(); vid.src = ''; S.filePath = null; S.fileName = null; S.info = null;
      S.duration = 0; S.offset = 0; S.isDirect = false;
      S.isPip = false;
      $('vph').style.display = 'flex'; hideLoad(); hideCTP(); $('btnPlay').textContent = '▶';
      $('splayed').style.width = '0'; $('sbuf').style.width = '0';
      $('timeCur').textContent = '0:00'; $('timeTot').textContent = '0:00';
      $('topNow').textContent = 'No file loaded'; $('extPill').style.display = 'none'; $('audWrap').style.display = 'none';
    }

    /* ── VIDEO EVENTS ────────────────────────────────────────────────────────── */
    vid.addEventListener('loadstart', () => { if (S.filePath) showLoad('Connecting…'); });
    vid.addEventListener('waiting', () => showLoad('Buffering…'));
    vid.addEventListener('canplay', () => hideLoad());
    vid.addEventListener('playing', () => { hideLoad(); hideCTP(); $('btnPlay').textContent = '⏸'; });
    vid.addEventListener('pause', () => $('btnPlay').textContent = '▶');
    vid.addEventListener('volumechange', syncMute);
    vid.addEventListener('error', () => { hideLoad(); if (S.filePath) showOSD('⚠️ Stream error — check console'); });
    vid.addEventListener('durationchange', () => { if (S.isDirect && isFinite(vid.duration)) { S.duration = vid.duration; $('timeTot').textContent = fmt(S.duration); } });
    vid.addEventListener('enterpictureinpicture', () => {
      S.isPip = true;
      $('btnPip').classList.add('on');
      showOSD('⧉ Picture-in-Picture ON');
    });
    vid.addEventListener('leavepictureinpicture', () => {
      S.isPip = false;
      $('btnPip').classList.remove('on');
      showOSD('⧉ Picture-in-Picture OFF');
    });
    vid.addEventListener('ended', () => {
      const t = actualTime(), nearEnd = (S.duration - t) < 2;

      // Premature end on transcoded stream — reload from current position
      if (!nearEnd && S.filePath && !S.isDirect) { loadStream(t); return; }

      // Loop current video
      if (S.looping && S.filePath) { loadStream(0); return; }

      // Auto-next: advance to next file in the scanned library
      if (S.autoplay && S._lastFiles && S._lastFiles.length > 0 && S.filePath) {
        const idx = S._lastFiles.findIndex((f) => f.path === S.filePath);
        if (idx !== -1 && idx + 1 < S._lastFiles.length) {
          const next = S._lastFiles[idx + 1];
          showOSD(`⏭ Next: ${next.name}`);
          playFile(next.path, next.name);
          return;
        }
      }

      $('btnPlay').textContent = '▶';
    });
    vid.addEventListener('timeupdate', () => {
      if (!S.duration) return;
      const t = actualTime(), pct = Math.min(t / S.duration, 1) * 100;
      $('splayed').style.width = pct + '%'; $('sdot').style.left = pct + '%'; $('timeCur').textContent = fmt(t);
    });
    vid.addEventListener('progress', () => {
      if (!vid.buffered.length || !S.duration) return;
      const end = vid.buffered.end(vid.buffered.length - 1);
      $('sbuf').style.width = (Math.min((S.isDirect ? end : S.offset + end) / S.duration, 1) * 100) + '%';
    });

    /* ── SEEK BAR ────────────────────────────────────────────────────────────── */
    const sbar = $('sbar');
    sbar.addEventListener('mousemove', e => {
      if (!S.duration) return;
      const r = sbar.getBoundingClientRect(), pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
      $('stip').textContent = fmt(pct * S.duration); $('stip').style.left = (pct * 100) + '%'; $('stip').style.opacity = '1';
    });
    sbar.addEventListener('mouseleave', () => $('stip').style.opacity = '0');
    sbar.addEventListener('click', e => {
      if (!S.filePath || !S.duration) return;
      const r = sbar.getBoundingClientRect(), pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)), t = pct * S.duration;
      if (S.isDirect) { vid.currentTime = t; showOSD(`⏩ ${fmt(t)}`); }
      else { showLoad('Seeking…'); loadStream(t); showOSD(`⏩ ${fmt(t)}`); }
    });

    /* ── CONTROLS ────────────────────────────────────────────────────────────── */
    $('vwrap').addEventListener('click', e => { if (e.target === $('vwrap') || e.target === vid) togglePlay(); });
    $('btnPlay').addEventListener('click', e => { e.stopPropagation(); togglePlay(); });
    function togglePlay() {
      if (!S.filePath) return; hideCTP();
      if (vid.paused) {
        vid.muted = false; vid.volume = vid.volume || parseFloat($('volRange').value) || 1;
        vid.play().catch(err => { if (err.name === 'NotAllowedError') showCTP(); else console.warn('[play]', err.message); }); flash(true);
      } else { vid.pause(); flash(false); }
    }
    $('btnStop').addEventListener('click', stopAll);
    $('btnRew').addEventListener('click', () => {
      if (!S.filePath) return; const t = Math.max(0, actualTime() - 10);
      if (S.isDirect) { vid.currentTime = t; showOSD(`⏪ ${fmt(t)}`); }
      else { showLoad('Seeking…'); loadStream(t); showOSD(`⏪ ${fmt(t)}`); }
    });
    $('btnFwd').addEventListener('click', () => {
      if (!S.filePath) return; const t = Math.min(S.duration || 999999, actualTime() + 10);
      if (S.isDirect) { vid.currentTime = t; showOSD(`⏩ ${fmt(t)}`); }
      else { showLoad('Seeking…'); loadStream(t); showOSD(`⏩ ${fmt(t)}`); }
    });
    $('btnMute').addEventListener('click', () => {
      vid.muted = !vid.muted; if (!vid.muted && vid.volume === 0) { vid.volume = 0.8; $('volRange').value = 0.8; }
      syncMute(); showOSD(vid.muted ? '🔇 Muted' : '🔊 Unmuted');
    });
    $('volRange').addEventListener('input', () => { vid.volume = parseFloat($('volRange').value); vid.muted = false; syncMute(); });
    $('spdSel').addEventListener('change', () => { vid.playbackRate = parseFloat($('spdSel').value); showOSD(`⚡ ${$('spdSel').value}×`); });
    $('btnLoop').addEventListener('click', () => { S.looping = !S.looping; $('btnLoop').classList.toggle('on', S.looping); showOSD(S.looping ? '🔁 Loop ON' : '➡️ Loop OFF'); });
    $('btnPip').addEventListener('click', togglePip);
    $('btnAutoplay').addEventListener('click', () => { S.autoplay = !S.autoplay; $('btnAutoplay').classList.toggle('on', S.autoplay); showOSD(S.autoplay ? '⏭ Auto-next ON' : '⏭ Auto-next OFF'); });
    $('btnInfo').addEventListener('click', () => {
      S.showInfo = !S.showInfo;
      $('tinfo').style.display = S.showInfo ? 'block' : 'none';
      $('btnInfo').classList.toggle('on', S.showInfo);
      if (S.showInfo) buildInfo();
    });
    $('audSel').addEventListener('change', () => {
      const idx = parseInt($('audSel').value, 10); if (idx === S.audioIdx) return;
      const t = actualTime(); S.audioIdx = idx;
      showOSD(`🎵 Audio: ${S.info?.audio[idx]?.label || 'Track ' + (idx + 1)}`);
      showLoad('Switching audio…'); loadStream(t, idx); if (S.showInfo) buildInfo();
    });
    $('vwrap').addEventListener('dblclick', toggleFs); $('btnFs').addEventListener('click', toggleFs);
    function toggleFs() { if (!document.fullscreenElement) $('vmain').requestFullscreen?.().catch(() => { }); else document.exitFullscreen?.(); }

    /* ── PICTURE-IN-PICTURE ──────────────────────────────────────────────────── */
    async function togglePip() {
      if (!S.filePath) {
        showOSD('⚠️ No video loaded');
        return;
      }
      if (!document.pictureInPictureEnabled) {
        showOSD('⚠️ PiP not supported in this browser');
        return;
      }
      try {
        if (document.pictureInPictureElement === vid) {
          await document.exitPictureInPicture();
        } else {
          await vid.requestPictureInPicture();
        }
      } catch (err) {
        if (err.name === 'NotAllowedError') {
          // Video must be playing to enter PiP
          showOSD('⚠️ Press play first, then try PiP');
        } else {
          showOSD('⚠️ PiP failed: ' + err.message);
          console.warn('[PiP]', err.name, err.message);
        }
      }
    }

    /* ── FIX 4: buildInfo resets innerHTML before building rows ─────────────── */
    function buildInfo() {
      const rows = $('tinfoRows');
      rows.innerHTML = ''; // FIX 4: reset first — prevents duplicate rows on re-open
      if (!S.info) { rows.innerHTML = '<div class="text-white/20 text-xs">No file loaded</div>'; return; }
      const v = S.info.video[0], a = S.info.audio[S.audioIdx];
      const mode = S.isDirect ? 'Direct (native seek)' : 'Transcoded (ffmpeg)';
      const items = [
        ['Mode', mode],
        ['Container', (S.info.format.name || '').split(',')[0] || '—'],
        v && ['Video', `${(v.codec || '').toUpperCase()} ${v.width}×${v.height} @${v.fps}fps`],
        a && ['Audio', `${(a.codec || '').toUpperCase()} ${a.channels}ch ${Math.round((a.sampleRate || 0) / 1000)}kHz`],
        ['Duration', fmt(S.info.format.duration)],
        ['Size', fmtSz(S.info.format.size)],
        ['Bitrate', S.info.format.bitrate ? Math.round(S.info.format.bitrate / 1000) + ' kbps' : '—'],
        ['Audio Tracks', String(S.info.audio.length)],
      ].filter(Boolean);
      rows.innerHTML = items.map(([k, v]) => `
    <div class="flex justify-between py-1 border-b border-white/5 last:border-0">
      <span class="text-white/30 text-[11px]">${k}</span>
      <span class="text-white text-xs font-medium max-w-[120px] text-right truncate">${escH(v)}</span>
    </div>`).join('');
    }

    /* ── CLICK-TO-PLAY + AUDIO UNLOCK ───────────────────────────────────────── */
    $('clickToPlay').addEventListener('click', () => { hideCTP(); vid.muted = false; vid.volume = vid.volume || 1; vid.play().catch(e => console.warn('[CTP]', e.message)); });

    // Unlock AudioContext on first page click — fixes audio blocked after async await
    let _au = false;
    document.addEventListener('click', function _u() {
      if (_au) return; _au = true;
      try { const ac = new (window.AudioContext || window.webkitAudioContext)(); const b = ac.createBuffer(1, 1, 22050); const s = ac.createBufferSource(); s.buffer = b; s.connect(ac.destination); s.start(0); setTimeout(() => ac.close(), 200); } catch (e) { }
      document.removeEventListener('click', _u, { capture: true });
    }, { capture: true });

    /* ── KEYBOARD ────────────────────────────────────────────────────────────── */
    document.addEventListener('keydown', e => {
      if (['INPUT', 'SELECT', 'TEXTAREA'].includes(e.target.tagName)) return;
      switch (e.key) {
        case ' ': case 'k': e.preventDefault(); togglePlay(); break;
        case 'ArrowLeft': e.preventDefault(); $('btnRew').click(); break;
        case 'ArrowRight': e.preventDefault(); $('btnFwd').click(); break;
        case 'ArrowUp': e.preventDefault(); vid.volume = Math.min(1, vid.volume + .1); $('volRange').value = vid.volume; showOSD(`🔊 ${Math.round(vid.volume * 100)}%`); break;
        case 'ArrowDown': e.preventDefault(); vid.volume = Math.max(0, vid.volume - .1); $('volRange').value = vid.volume; showOSD(`🔊 ${Math.round(vid.volume * 100)}%`); break;
        case 'm': case 'M': $('btnMute').click(); break;
        case 'f': case 'F': toggleFs(); break;
        case 'p': case 'P': $('btnPip').click(); break;
        case 'l': case 'L': $('btnLoop').click(); break;
        case 'n': case 'N': $('btnAutoplay').click(); break;
        case 'i': case 'I': $('btnInfo').click(); break;
        case 's': case 'S': stopAll(); break;
        case 'Escape': if (document.fullscreenElement) document.exitFullscreen(); break;
      }
    });

    /* ── INIT ────────────────────────────────────────────────────────────────── */
    $('pathInput').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); scanFolder(); } });
    S.recentDirs = JSON.parse(localStorage.getItem('vlc_recent') || '[]');
    renderRecent();
    // FIX 8: load real home path, then auto-scan last used folder
    loadHomePath().then(() => {
      if (S.recentDirs.length) {
        $('pathInput').value = S.recentDirs[0];
        scanFolder(S.recentDirs[0]);  // auto-scan last folder on page load
      } else {
        // Set a helpful default path
        quickPath('videos');
      }
    });
  </script>
</body>
